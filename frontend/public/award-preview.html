<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Award Preview</title>
<style>
  body { margin:0; background:#0B0B0B; display:grid; place-items:center; min-height:100vh; font-family:Georgia, serif; }
  .stage { position:relative; width:620px; height:620px; }
  .glow { position:absolute; inset:0; background:radial-gradient(circle at 81% 36%, rgba(224,30,38,0.28), rgba(224,30,38,0) 40%); }
  .reaper { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; z-index:2; }
  .card-text {
    position:absolute; z-index:3; text-align:center; color:#fff;
    left:70.6%; top:20%; width:21%; height:22%;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
  }
  .kicker { color:#E01E26; font-size:8px; letter-spacing:1.2px; font-weight:700; text-transform:uppercase; }
  .title { font-size:15px; line-height:1.0; font-weight:700; text-shadow:0 1px 4px rgba(0,0,0,0.7); }
  .rule { width:26px; height:2px; background:#E01E26; margin:2px 0; }
  .name { font-size:12px; font-style:italic; color:#EDEDED; }
  .foot { font-size:8px; color:#9A9FA5; letter-spacing:1px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="glow"></div>
    <img class="reaper" src="/reaper-award.png" alt="reaper" />
    <div class="card-text">
      <div class="kicker">Certified</div>
      <div class="title">PUB CRAWL<br/>SURVIVOR</div>
      <div class="rule"></div>
      <div class="name">Alex</div>
      <div class="foot">Fork·Fate</div>
    </div>
  </div>
</body>
</html>

<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Award Preview</title>
<style>
  body { margin:0; background:#0B0B0B; display:grid; place-items:center; min-height:100vh; font-family:Georgia, serif; }
  .stage { position:relative; width:560px; height:788px; overflow:hidden; border-radius:10px; background:linear-gradient(#1C0406,#0C0304 50%,#070707); }
  .glow { position:absolute; inset:0; background:radial-gradient(circle at 50% 22%, rgba(224,30,38,0.42), rgba(150,16,22,0.12) 55%, rgba(224,30,38,0) 72%); }
  .vig { position:absolute; inset:0; background:radial-gradient(circle at 50% 48%, rgba(0,0,0,0) 45%, rgba(0,0,0,0.55) 100%); }
  .reaper { position:absolute; top:0; left:0; width:100%; height:71%; object-fit:contain; z-index:2; }
  .selfie {
    position:absolute; z-index:3; overflow:hidden; border-radius:6px;
    left:52.2%; top:24.9%; width:42%; height:14.6%;
  }
  .selfie img { width:100%; height:100%; object-fit:cover; }
  .info {
    position:absolute; z-index:3; left:21.3%; top:71.7%; width:57.4%; height:25%;
    background:linear-gradient(#161616,#0C0C0C); border:2px solid rgba(224,30,38,0.7);
    border-radius:16px; box-shadow:0 0 26px rgba(224,30,38,0.35);
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:6px; color:#fff;
    padding:0 18px;
  }
  .kicker { color:#E01E26; font-size:12px; letter-spacing:3px; font-weight:700; text-transform:uppercase; }
  .title { font-size:26px; line-height:1.02; font-weight:700; }
  .rule { width:44px; height:2px; background:#E01E26; margin:4px 0; }
  .name { font-size:20px; font-style:italic; color:#F3F3F3; }
  .crew { font-size:13px; color:#B9BEC4; }
  .foot { font-size:11px; color:#9A9FA5; letter-spacing:1px; margin-top:2px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="glow"></div>
    <img class="reaper" src="/reaper-award.png" alt="reaper" />
    <div class="vig"></div>
    <div class="selfie"><img src="https://images.unsplash.com/photo-1543807535-eceef0bc6599?crop=entropy&cs=srgb&fm=jpg&q=85&w=900" alt="selfie" /></div>
    <div class="info">
      <div class="kicker">I Survived</div>
      <div class="title">THE FORK·FATE<br/>PUB CRAWL</div>
      <div class="rule"></div>
      <div class="name">Alex</div>
      <div class="crew">with Sam, Jordan &amp; Casey</div>
      <div class="foot">fork-fate.com</div>
    </div>
  </div>
</body>
</html>
